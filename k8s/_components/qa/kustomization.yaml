apiVersion: kustomize.config.k8s.io/v1alpha1
kind: Component

labels:
  - pairs:
      env: qa               # This label is added to (almost) all resources
    includeSelectors: true  # This ensures Deployment selectors are updated
    includeTemplates: true  # This ensures Pod templates get the labels

resources:
  - cluster-param.yaml

components:
  - ../base   # configures domain replacement
  - ../../_transformers/prefix-domain