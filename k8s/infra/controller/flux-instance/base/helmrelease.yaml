---
# yaml-language-server: $schema=https://k8s-schemas.home-operations.com/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-instance
spec:
  chartRef:
    kind: OCIRepository
    name: flux-instance
  interval: 1h
  values:
    instance:
      distribution:
        artifact: oci://ghcr.io/controlplaneio-fluxcd/flux-operator-manifests:v0.55.0
        version: 2.x
      cluster:
        networkPolicy: false
        size: small
      components:
        - source-controller
        - kustomize-controller
        - helm-controller
        - notification-controller
      sync:
        kind: GitRepository
        url: "https://github.com/isejalabs/homelab"
        ref: "refs/heads/issue/808_fluxcd"
        path: "k8s/infra/controller/fluxcd/cluster/envs/REPLACE_ME"
        interval: 1h
