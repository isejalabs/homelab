# cherry-picking https://github.com/vehagn/homelab/pull/78/commits
#installCRDs: true
crds:
  enabled: true

# use external DNS resolvers for accomodating split DNS
dns01RecursiveNameservers: https://1.1.1.1:443/dns-query,https://9.9.9.9:443/dns-query

extraArgs:
  - "--enable-gateway-api"

resources:
  limits:
    cpu: 100m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi
webhook:
  resources:
    limits:
      cpu: 100m
      memory: 64Mi
    requests:
      cpu: 10m
      memory: 32Mi
cainjector:
  resources:
    limits:
      cpu: 100m
      memory: 128Mi
    requests:
      cpu: 10m
      memory: 64Mi