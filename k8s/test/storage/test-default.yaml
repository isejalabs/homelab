---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: &name test-sc-default
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 333Mi
---
apiVersion: v1
kind: Pod
metadata:
  name: &name test-sc-default
  namespace: default
spec:
  containers:
    - name: test
      image: busybox@sha256:32015ee641bfecc97161986c9d24957068175444f66fbcbe08a664b6cf5c1c2e
      command: ["sh", "-c", "while true; do echo $(date) >> /data/log.txt; sleep 5; done"]
      volumeMounts:
        - name: data
          mountPath: /data
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: *name